<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imperva Stage & Version Control – Prototype</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 640px;
      padding: 48px 24px;
    }

    .label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: #6b7280;
      margin-bottom: 48px;
    }

    .versions {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .version-card {
      flex: 1;
      max-width: 260px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, border-color 0.15s;
    }

    .version-card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      border-color: #d1d5db;
    }

    .version-card.v2 {
      border-color: #3b82f6;
    }

    .version-card.v2:hover {
      border-color: #2563eb;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.15);
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      margin-bottom: 14px;
      background: #f3f4f6;
      color: #6b7280;
    }

    .version-card.v2 .badge {
      background: #eff6ff;
      color: #2563eb;
    }

    .version-title {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
    }

    .version-desc {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="label">Imperva</div>
    <h1>Stage &amp; Version Control</h1>
    <p class="subtitle">UI Prototype — Select a version to view</p>

    <div class="versions">
      <a href="./v1/" class="version-card">
        <div class="badge">V1 · Original</div>
        <div class="version-title">Version 1</div>
        <p class="version-desc">Initial prototype used in user testing sessions.</p>
      </a>

      <a href="./v2/" class="version-card v2">
        <div class="badge">V2 · Updated</div>
        <div class="version-title">Version 2</div>
        <p class="version-desc">Revised prototype incorporating post-testing feedback.</p>
      </a>
    </div>
  </div>
</body>
</html>
